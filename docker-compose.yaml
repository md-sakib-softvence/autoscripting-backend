# ──────────────────────────────────────────────────────────────
# docker-compose.yaml
# Uses Neon cloud DB — no local postgres/redis needed
# ──────────────────────────────────────────────────────────────

services:
  # ── Backend Server ─────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: sakib/dynamic-scraper-server:latest
    container_name: dynamic-scraper_server
    restart: always
    environment:
      NODE_ENV: production
      APP_PORT: 3003
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://neondb_owner:npg_vom1OMDnH6tE@ep-frosty-thunder-amaw43wi-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    ports:
      - "${HOST_PORT:-3003}:3003"
    networks:
      - app_network

  # ── Frontend Client ────────────────────────────────────────
  client:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: sakib/dynamic-scraper-client:latest
    container_name: dynamic-scraper_client
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://server:3003
    depends_on:
      - server
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
